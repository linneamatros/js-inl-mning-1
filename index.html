<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" integrity="sha384-vSIIfh2YWi9wW0r9iZe7RJPrKwp6bG+s9QZMoITbCckVJqGCCRhc+ccxNcdpHuYu" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>Registrering</title>
</head>
<body>
  
  <div class="container">
    <div class="box">
    <div class="form d-flex">
      <form id="form" class="col-6">
        <h2>Registrering</h2>
          <div class="form-content">

          <div class="input-group">
            <label for="firstName">Förnamn</label>
            <input type="text" id="firstName" class="form-control">
            <i class="fas fa-exclamation-circle"></i>
            <i class="fas fa-check-circle"></i>
            <small>error message!</small>
          </div>

          <div class="input-group">
            <label for="lastName">Efternamn</label>
            <input type="text" id="lastName" class="form-control">
            <i class="fas fa-exclamation-circle"></i>
            <i class="fas fa-check-circle"></i>
            <small>error message!</small>
          </div>

          <div class="input-group">
            <label for="email">E-postadress</label>
            <input type="email" id="email" class="form-control">
            <i class="fas fa-exclamation-circle"></i>
            <i class="fas fa-check-circle"></i>
            <small>error message!</small>
          </div>

          <div class="input-group">
            <button class="submit btn col-12">Registrera</button>
          </div>
        </form>
      </div>

    <div id="box2" class="box">
      <div class="users">
          <h2>Medlemmar</h2>
            <div class="list">
              <div id="output" class="mt-1">
                <div class="user d-flex justify-content-between align-items-center mb-4">
                  <div class="text">
                    <h3>FirstName LastName</h3>
                    <small>email@mail.com</small>
                  </div>
                  <div class="col-3">
                    <button class="edit btn btn-info col-12">Ändra</button>
                    <button class="remove btn btn-danger col-12">Radera</button>
                  
                  </div>
                </div>
              </div>
            </div>
        </div>
      </div>


    
    </div>   

  </div>
</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>    <link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js" integrity="sha384-q2kxQ16AaE6UbzuKqyBE9/u/KzioAlnx2maXQHiDX9d4/zp8Ok3f+M7DPm+Ib6IU" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>
<script src="script.js"></script>

</body>
</html>
